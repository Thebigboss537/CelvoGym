services:
  kondix-api:
    build:
      context: .
      dockerfile: src/Kondix.Api/Dockerfile
    ports:
      - "5100:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=celvo;Username=celvo_user;Password=${DB_PASSWORD:-dev}
      - ConnectionStrings__Redis=redis:6379,password=${REDIS_PASSWORD:-dev}
      - CelvoGuard__SigningKey=${JWT_SIGNING_KEY:-super-secret-dev-key-minimum-32-chars-long!!}
      - CelvoGuard__Issuer=guard.celvo.dev
      - Minio__Endpoint=minio:9000
      - Minio__AccessKey=minioadmin
      - Minio__SecretKey=minioadmin
      - Minio__PublicUrl=http://localhost:9000
      - Minio__UseSsl=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  kondix-web:
    build:
      context: ./kondix-web
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - kondix-api

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: celvo
      POSTGRES_USER: celvo_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./setup/init-e2e-databases.sql:/docker-entrypoint-initdb.d/10-init-e2e.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U celvo_user -d celvo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-dev}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

volumes:
  pgdata:
  redis_data:
  minio_data:

name: CelvoGym Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  API_IMAGE: ghcr.io/thebigboss537/celvogym-api
  WEB_IMAGE: ghcr.io/thebigboss537/celvogym-web

jobs:
  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/setup-qemu-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: src/CelvoGym.Api/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          build-args: |
            NUGET_TOKEN=${{ secrets.GHCR_TOKEN }}
          cache-from: type=gha,scope=celvogym-api
          cache-to: type=gha,mode=max,scope=celvogym-api

  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/setup-qemu-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./celvogym-web
          file: celvogym-web/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=celvogym-web
          cache-to: type=gha,mode=max,scope=celvogym-web

  deploy:
    needs: [build-api, build-web]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /opt/celvo
            docker compose -f docker-compose.prod.yml pull celvogym-api celvogym-web
            docker compose -f docker-compose.prod.yml up -d celvogym-api celvogym-web
            sleep 15
            curl -sf https://gym.celvo.dev/api/v1/health || (docker compose -f docker-compose.prod.yml logs --tail=50 celvogym-api && exit 1)

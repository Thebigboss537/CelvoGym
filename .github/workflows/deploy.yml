name: Kondix Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  API_IMAGE: ghcr.io/thebigboss537/kondix-api
  WEB_IMAGE: ghcr.io/thebigboss537/kondix-web

jobs:
  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/setup-qemu-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Kondix.Api/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          build-args: |
            NUGET_TOKEN=${{ secrets.GHCR_TOKEN }}
          cache-from: type=gha,scope=kondix-api
          cache-to: type=gha,mode=max,scope=kondix-api

  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Build Angular natively on x86 (fast, no QEMU)
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: kondix-web/package-lock.json
      - name: Install dependencies
        run: cd kondix-web && npm ci
      - name: Build Angular
        run: cd kondix-web && npx ng build --configuration=production

      # Package into ARM64 nginx image (only copies static files, no QEMU build)
      - uses: docker/setup-buildx-action@v3
      - uses: docker/setup-qemu-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./kondix-web
          file: kondix-web/Dockerfile.nginx
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=kondix-web
          cache-to: type=gha,mode=max,scope=kondix-web

  deploy:
    needs: [build-api, build-web]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /opt/celvo
            docker compose -f docker-compose.prod.yml pull kondix-api kondix-web
            docker compose -f docker-compose.prod.yml up -d kondix-api kondix-web
            sleep 15
            curl -sf https://kondix.celvo.dev/api/v1/health || (docker compose -f docker-compose.prod.yml logs --tail=50 kondix-api && exit 1)

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kondix — Vista Alumno · Interactivo</title>
<link rel="stylesheet" href="../tokens.css" />
<style>
  html, body { margin: 0; padding: 0; background: #0A0A0C; min-height: 100vh; font-family: var(--font-sans); }

  .stage {
    min-height: 100vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(ellipse 900px 600px at 20% 0%, rgba(230,38,57,0.08) 0%, transparent 55%),
      radial-gradient(ellipse 700px 500px at 80% 100%, rgba(230,38,57,0.06) 0%, transparent 55%),
      linear-gradient(180deg, #09090B 0%, #0C0C0F 100%);
  }

  /* subtle grid */
  .stage::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  .phone-wrap {
    position: relative;
    display: flex;
    gap: 36px;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }

  .sidebar {
    width: 260px;
    color: var(--color-text);
  }
  .sidebar h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 32px;
    letter-spacing: -0.02em;
    margin: 0 0 4px;
    background: linear-gradient(135deg, #fff 0%, #A3A3A3 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .sidebar .sub {
    font-size: 13px; color: var(--color-text-muted); line-height: 1.5;
    margin-bottom: 20px;
  }
  .sidebar .quick {
    margin-top: 20px; display: flex; flex-direction: column; gap: 8px;
  }
  .quick-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 10px;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
    color: var(--color-text-secondary); font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; text-align: left; width: 100%;
    font-family: inherit;
  }
  .quick-btn:hover { background: rgba(230,38,57,0.08); border-color: rgba(230,38,57,0.3); color: #F14D5E; }
  .quick-btn.active { background: rgba(230,38,57,0.15); border-color: rgba(230,38,57,0.4); color: #F14D5E; }
  .quick-btn .k { font-size: 10px; opacity: 0.5; margin-left: auto; padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.05); }

  .sidebar .tip {
    margin-top: 24px; padding: 12px;
    background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
    border-radius: 10px; font-size: 11px; color: var(--color-text-muted); line-height: 1.55;
  }
  .sidebar .tip strong { color: var(--color-text-secondary); display: block; margin-bottom: 4px; letter-spacing: 0.04em; font-size: 10px; text-transform: uppercase; }

  @media (max-width: 960px) {
    .sidebar { display: none; }
    .phone-wrap { gap: 0; }
    .stage { padding: 16px; }
  }

  /* Hide scrollbars everywhere inside frames */
  *::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="../icons.jsx"></script>
<script type="text/babel" src="icons-extra.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="screens-home.jsx"></script>
<script type="text/babel" src="screens-more.jsx"></script>
<script type="text/babel" src="app-shell.jsx"></script>

<script type="text/babel" data-presets="react">
const { useState: useStateMain, useEffect: useEffectMain } = React;

const PHONE_W = 390;
const PHONE_H = 820;

// Custom phone frame (single source, dark iPhone with Dynamic Island)
const PhoneFrame = ({ children }) => (
  <div style={{
    width: PHONE_W + 14, height: PHONE_H + 14,
    borderRadius: 48, padding: 7,
    background: 'linear-gradient(135deg, #2a2a2a 0%, #0a0a0a 100%)',
    boxShadow:
      '0 60px 120px rgba(0,0,0,0.6),' +
      '0 0 0 1px rgba(255,255,255,0.05) inset,' +
      '0 0 0 2px rgba(0,0,0,0.9),' +
      '0 0 80px rgba(230,38,57,0.12)',
    position: 'relative',
  }}>
    <div style={{
      width: '100%', height: '100%', borderRadius: 42, overflow: 'hidden',
      background: '#09090B', position: 'relative',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 10, left: '50%', transform: 'translateX(-50%)',
        width: 118, height: 34, borderRadius: 20, background: '#000', zIndex: 100,
        boxShadow: '0 0 0 1px rgba(255,255,255,0.06), inset 0 0 4px rgba(0,0,0,0.8)',
      }} />
      {/* status bar */}
      <div style={{
        position: 'absolute', top: 0, left: 0, right: 0, zIndex: 90,
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '16px 30px 0', pointerEvents: 'none',
        fontFamily: '-apple-system, system-ui, sans-serif',
        color: '#fff', fontSize: 15, fontWeight: 600, letterSpacing: -0.02,
      }}>
        <span>9:41</span>
        <div style={{ display: 'flex', gap: 5, alignItems: 'center' }}>
          <StatusGlyph />
        </div>
      </div>
      {/* content */}
      <div style={{ width: '100%', height: '100%', paddingTop: 48 }}>
        {children}
      </div>
    </div>
  </div>
);

const StatusGlyph = () => (
  <svg width="62" height="14" viewBox="0 0 62 14" fill="none" xmlns="http://www.w3.org/2000/svg">
    {/* signal bars */}
    <rect x="0" y="8" width="3" height="6" rx="1" fill="#fff" />
    <rect x="5" y="6" width="3" height="8" rx="1" fill="#fff" />
    <rect x="10" y="3" width="3" height="11" rx="1" fill="#fff" />
    <rect x="15" y="0" width="3" height="14" rx="1" fill="#fff" />
    {/* wifi */}
    <path d="M24 5c3-3 8-3 11 0" stroke="#fff" strokeWidth="1.7" strokeLinecap="round" fill="none"/>
    <path d="M26 8c2-2 5-2 7 0" stroke="#fff" strokeWidth="1.7" strokeLinecap="round" fill="none"/>
    <circle cx="29.5" cy="11.5" r="1.2" fill="#fff"/>
    {/* battery */}
    <rect x="42" y="3" width="18" height="9" rx="2.2" stroke="#fff" strokeWidth="1" fill="none"/>
    <rect x="43" y="4" width="14" height="7" rx="1.3" fill="#fff"/>
    <rect x="60.5" y="5.5" width="1.2" height="4" rx="0.6" fill="#fff"/>
  </svg>
);

const TIP = {
  home: 'Tu punto de partida diario. La racha arriba motiva, la hero card arranca el entreno en un tap.',
  calendar: 'Mes vivo — los días rojos son entrenos completados, los huecos con punto son días sugeridos.',
  dayDetail: 'Entrando en un día ves qué rutina toca y puedes empezar si es hoy.',
  overview: 'Antes de empezar: nota del coach, ejercicios, series por tipo (normal · warmup · drop · failure).',
  execute: 'Registra peso + reps por serie. Cuando superas tu último registro → toast de PR. Después de cada serie, timer de descanso con anillo.',
  complete: 'Resumen del entreno con volumen total, PRs conseguidos y duración.',
  progress: 'Tres tabs: Records · Medidas (peso/grasa con sparkline) · Fotos de progreso.',
  profile: 'Datos personales, coach asignado y ajustes.',
};
const SCREEN_LABEL = {
  home: 'Home', calendar: 'Calendario', dayDetail: 'Detalle de día',
  overview: 'Vista previa', execute: 'Logging', complete: 'Completado',
  progress: 'Progreso', profile: 'Perfil',
};

const App = () => {
  const [screen, setScreen] = useStateMain('home');

  // Jump-to shortcuts — use window.__kxNav if we expose one
  const jumpTo = (s) => {
    setScreen(s); // triggers remount via key below
  };

  const shortcuts = [
    { key: 'home', label: 'Home', icon: 'home', k: 'Tu día' },
    { key: 'overview', label: 'Vista previa rutina', icon: 'clipboardList', k: 'Preview' },
    { key: 'execute', label: 'Logging de series', icon: 'playCircle', k: 'Activo' },
    { key: 'complete', label: 'Entreno completado', icon: 'check', k: 'Resumen' },
    { key: 'calendar', label: 'Calendario', icon: 'calendar', k: 'Mes' },
    { key: 'progress', label: 'Progreso', icon: 'trendingUp', k: 'Stats' },
    { key: 'profile', label: 'Perfil', icon: 'user', k: 'Tú' },
  ];

  const tip = TIP[screen] || '';

  return (
    <div className="stage">
      <div className="phone-wrap">
        <div className="sidebar">
          <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 0.12, textTransform: 'uppercase', color: '#F14D5E', marginBottom: 8 }}>
            Kondix · Vista alumno
          </div>
          <h1>Lucía Martín</h1>
          <div className="sub">
            Push Pull Legs · Semana 3 de 8<br/>
            Hipertrofia · Coach Mario Vega
          </div>

          <div className="quick">
            {shortcuts.map(s => (
              <button key={s.key} className={`quick-btn ${screen === s.key ? 'active' : ''}`}
                onClick={() => jumpTo(s.key)}>
                <Icon name={s.icon} size={14} />
                <span>{s.label}</span>
                <span className="k">{s.k}</span>
              </button>
            ))}
          </div>

          <div className="tip">
            <strong>{SCREEN_LABEL[screen]}</strong>
            {tip}
          </div>

          <div className="tip" style={{ marginTop: 10 }}>
            <strong>Prueba la interacción</strong>
            1. Pulsa "Empezar entreno" en Home<br/>
            2. En Logging, completa una serie con ✓<br/>
            3. Aparece el timer de descanso<br/>
            4. Pon 52 kg × 9 en press banca → PR
          </div>
        </div>

        <PhoneFrame>
          <StudentApp key={screen} variant="hero" initialScreen={screen} />
        </PhoneFrame>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

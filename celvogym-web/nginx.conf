server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    types {
        application/manifest+json webmanifest;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /ngsw-worker.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location = /ngsw.json {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webmanifest)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml application/manifest+json;
    gzip_min_length 256;
}
